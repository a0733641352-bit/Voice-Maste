    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700;800;900&display=swap');
        
        body {
            font-family: 'Assistant', sans-serif;
            background: #f1f5f9;
            color: #1e293b;
            transition: background 0.5s ease, color 0.3s ease;
            background-attachment: fixed;
        }
        
        .card {
            background: white;
            border: 1px solid #e2e8f0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .loading-spinner {
            border: 2px solid rgba(255,255,255,0.3);
            border-top: 2px solid currentColor;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .ai-glow {
            box-shadow: 0 0 25px rgba(99, 102, 241, 0.08);
        }
        
        .feature-badge {
            background: linear-gradient(90deg, #4f46e5, #9333ea);
            color: white; 
            padding: 2px 8px;
            border-radius: 99px;
            font-size: 10px;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        
        /* PREMIUM DARK MODE FUTURISTIC THEME */
        body.dark-mode {
            background: linear-gradient(135deg, #0f0c20 0%, #0b112c 50%, #050515 100%);
            color: #f1f5f9;
        }
        
        body.dark-mode .card {
            background: rgba(20, 16, 45, 0.45) !important;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(139, 92, 246, 0.25) !important;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4), 
                        0 0 20px rgba(139, 92, 246, 0.1);
        }
        
        body.dark-mode .card:hover {
            border-color: rgba(168, 85, 247, 0.45) !important;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.55), 
                        0 0 25px rgba(139, 92, 246, 0.2);
        }
        
        /* Typography Clarity in Dark Mode */
        body.dark-mode h1, body.dark-mode h2, body.dark-mode h3, body.dark-mode h4,
        body.dark-mode p, body.dark-mode span, body.dark-mode label, body.dark-mode div {
            color: #f1f5f9 !important;
        }
        
        body.dark-mode .text-slate-400, 
        body.dark-mode .text-slate-500,
        body.dark-mode #noTracks {
            color: #a78bfa !important;
        }

        body.dark-mode .text-indigo-600 {
            color: #a78bfa !important;
        }
        
        /* Form Inputs Redesign in Dark Mode */
        body.dark-mode input, 
        body.dark-mode textarea, 
        body.dark-mode select {
            background: rgba(10, 8, 28, 0.65) !important;
            color: #f8fafc !important;
            border: 1px solid rgba(139, 92, 246, 0.35) !important;
        }
        
        body.dark-mode input:focus, 
        body.dark-mode textarea:focus, 
        body.dark-mode select:focus {
            border-color: #a855f7 !important;
            box-shadow: 0 0 12px rgba(168, 85, 247, 0.4);
        }
        
        body.dark-mode option {
            background: #0b112c;
            color: #f8fafc;
        }
        
        body.dark-mode textarea::placeholder,
        body.dark-mode input::placeholder {
            color: #64748b;
        }
        
        /* Premium Buttons Customization */
        body.dark-mode button:not(#generateBtn):not(#clearApiKey):not(#clearTracks) {
            background: rgba(99, 102, 241, 0.12);
            border: 1px solid rgba(139, 92, 246, 0.3);
            color: #e2e8f0 !important;
        }
        
        body.dark-mode button:not(#generateBtn):not(#clearApiKey):not(#clearTracks):hover {
            background: rgba(139, 92, 246, 0.25);
            border-color: rgba(168, 85, 247, 0.5);
            color: #ffffff !important;
        }
        
        body.dark-mode #generateBtn {
            background: linear-gradient(90deg, #6366f1, #a855f7);
            box-shadow: 0 4px 20px rgba(147, 51, 234, 0.35);
        }
        
        body.dark-mode #generateBtn:hover {
            background: linear-gradient(90deg, #4f46e5, #9333ea);
            box-shadow: 0 6px 25px rgba(147, 51, 234, 0.5);
        }
        
        body.dark-mode .feature-badge {
            background: linear-gradient(90deg, #a855f7, #6366f1);
            box-shadow: 0 0 12px rgba(168, 85, 247, 0.4);
        }
        
        body.dark-mode audio {
            filter: hue-rotate(260deg) brightness(1.2);
        }
        
        body.dark-mode #toggleDark {
            background: rgba(20, 16, 45, 0.6);
            border: 1px solid rgba(139, 92, 246, 0.3);
        }
        
        body.dark-mode #toggleDark svg {
            color: #a78bfa;

    <script>
        // Global State & Config
        let currentApiKey = localStorage.getItem('gemini_api_key') || "";
        const modelText = "gemini-3.1-flash-lite";
        const modelAudio = "gemini-2.5-flash-preview-tts";

        // IndexedDB Configuration for Surviving Reloads & Large Blobs
        const DB_NAME = 'VoiceMasterDB';
        const DB_VERSION = 1;
        const STORE_NAME = 'tracks';
        const MAX_STORED_TRACKS = 40;
        let db = null;

        const styleMap = {
            'טבעי': 'natural', 'natural': 'natural',
            'שמח': 'cheerful', 'cheerful': 'cheerful',
            'רציני': 'serious', 'serious': 'serious',
            'לחישה': 'whisper', 'whisper': 'whisper',
            'נרגש': 'excited', 'excited': 'excited',
            'רגוע': 'calm', 'calm': 'calm',
            'סמכותי': 'authoritative', 'authoritative': 'authoritative',
            'ידידותי': 'friendly', 'friendly': 'friendly',
            'מקצועי': 'professional', 'professional': 'professional',
            'מספר סיפורים': 'storytelling', 'storytelling': 'storytelling',
            'צעקה': 'shouting', 'shouting': 'shouting',
            'מבועת': 'terrified', 'terrified': 'terrified',
            'עצוב': 'sad', 'sad': 'sad',
            'כועס': 'angry', 'angry': 'angry',
            'מלא תקווה': 'hopeful', 'hopeful': 'hopeful'
        };

        const els = {
            textInput: document.getElementById('textInput'),
            promptInput: document.getElementById('promptInput'),
            generateBtn: document.getElementById('generateBtn'),
            magicWriteBtn: document.getElementById('magicWriteBtn'),
            analyzeToneBtn: document.getElementById('analyzeToneBtn'),
            voiceSelect: document.getElementById('voiceSelect'),
            styleSelect: document.getElementById('styleSelect'),
            tracksContainer: document.getElementById('tracksContainer'),
            noTracks: document.getElementById('noTracks'),
            body: document.getElementById('bodyTag'),
            toast: document.getElementById('toast'),
            toastMessage: document.getElementById('toastMessage'),
            apiKeyBtn: document.getElementById('apiKeyBtn'),
            apiKeyPopover: document.getElementById('apiKeyPopover'),
            apiKeyInput: document.getElementById('apiKeyInput'),
            saveApiKey: document.getElementById('saveApiKey'),
            clearApiKey: document.getElementById('clearApiKey'),
            apiKeyStatus: document.getElementById('apiKeyStatus')
        };

        // Initialize IndexedDB
        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onupgradeneeded = (e) => {
                    const database = e.target.result;
                    if (!database.objectStoreNames.contains(STORE_NAME)) {
                        database.createObjectStore(STORE_NAME, { keyPath: 'id' });
                    }
                };
                request.onsuccess = (e) => {
                    db = e.target.result;
                    resolve(db);
                };
                request.onerror = (e) => reject(e.target.error);
            });
        }

        // Initialize UI & Persistent States
        window.addEventListener('DOMContentLoaded', async () => {
            if (localStorage.getItem('darkMode') === 'true') {
                els.body.classList.add('dark-mode');
            }
            updateApiStatus();
            try {
                await initDB();
                await renderStoredTracks();
            } catch (e) {
                console.error("Database initialization failed:", e);
            }
        });

        function updateApiStatus() {
            if (currentApiKey) {
                els.apiKeyStatus.innerText = "מפתח מוגדר ✅";
                els.apiKeyStatus.style.color = "#16a34a";
                els.apiKeyInput.value = currentApiKey;
            } else {
                els.apiKeyStatus.innerText = "הגדר מפתח ⚠️";
                els.apiKeyStatus.style.color = "";
                els.apiKeyInput.value = "";
            }
        }

        // Dark Mode Click Handler
        document.getElementById('toggleDark').onclick = () => {
            els.body.classList.toggle('dark-mode');
            localStorage.setItem('darkMode', els.body.classList.contains('dark-mode'));
        };

        // API Key Popover Logic
        els.apiKeyBtn.onclick = (e) => {
            e.stopPropagation();
            els.apiKeyPopover.classList.toggle('hidden');
        };

        els.saveApiKey.onclick = () => {
            const key = els.apiKeyInput.value.trim();
            if (key) {
                currentApiKey = key;
                localStorage.setItem('gemini_api_key', key);
                updateApiStatus();
                els.apiKeyPopover.classList.add('hidden');
                showToast("מפתח ה-API נשמר בהצלחה", "success");
            }
        };

        els.clearApiKey.onclick = () => {
            currentApiKey = "";
            localStorage.removeItem('gemini_api_key');
            updateApiStatus();
            showToast("מפתח ה-API נמחק");
        };

        document.addEventListener('click', () => els.apiKeyPopover.classList.add('hidden'));

            els.textInput.value = currentVal.substring(0, startPos) + tag + currentVal.substring(endPos);

        // API Call Handler with Exponential Backoff Retries
        async function apiCall(model, payload, retries = 5) {
            if (!currentApiKey) {
                showToast("אנא הגדר מפתח API בתפריט למעלה");
                els.apiKeyPopover.classList.remove('hidden');
                throw new Error("Missing API Key");
            }
            // אם מדובר במודל שמע, נשתמש ב-Endpoint העדכני של גוגל למניעת שגיאות 429
        const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${currentApiKey}`;
            
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    const data = await response.json();
                    if (response.ok) return data;
                    if (response.status === 429) {
                        await new Promise(r => setTimeout(r, Math.pow(2, i) * 1000));
                    } else if (response.status === 403 || response.status === 401) {
                        showToast("מפתח ה-API אינו תקין");
                        throw new Error("Invalid API Key");
                    } else {
                        throw new Error(data.error?.message || "Communication Error");
                    }
                } catch (e) {
                    if (i === retries - 1) throw e;
                }
            }
        }

        function showToast(msg, type = 'error') {

            setTimeout(() => { els.toast.classList.add('opacity-0', 'translate-y-4'); }, 4000);
        }

        // ✨ Intelligent Tone Adaptation Inline Modifier
        els.analyzeToneBtn.onclick = async () => {

            if (!text) return showToast("אין טקסט לניתוח");

                const data = await apiCall(modelText, {
                    contents: [{ parts: [{ text: `נתח את הטקסט הבא והוסף תגיות סגנון בסוגריים מרובעים [ ] לפי ההקשר.

השתמש בסגנונות קיימים אם הם מתאימים, אך אם צריך - המצא סגנון חדש שמתאים בדיוק למשמעות המשפט.

התגיות צריכות להיות קצרות, טבעיות ומתאימות לקריינות (למשל: [לוחש], [דרמטי], [רגוע מאוד], [חדשותי], [אירוני], [מהיר]).
אם אין צורך בסגנון מיוחד – אל תוסיף תגית בכלל.
החזר רק את הטקסט עם התגיות, ללא הסברים. החזר אך ורק את הטקסט המלא עם התגיות המשולבות בתוכו ללא שום הסבר או מלל נוסף. הטקסט: "${text}"` }] }]
                });

                if (result) {

                    showToast("הסגנון הותאם ישירות לתוך הטקסט", "success");
                }

        // ✨ Vocalization (Nikud)
        document.getElementById('vocalizeBtn').onclick = async () => {
            const text = els.textInput.value.trim();

            toggleLoader('vocalize', true);
            try {

                });

        // --- Core Multi-Style Parsing & Audio Processing ---

        function parseMultiStyleText(text) {
            const regex = /\[([^\]]+)\]/g;
            let match;
            let lastIndex = 0;
            let currentStyle = 'natural';
            const segments = [];

            while ((match = regex.exec(text)) !== null) {
                const plainText = text.substring(lastIndex, match.index).trim();
                if (plainText) {
                    segments.push({ style: currentStyle, text: plainText });
                }
                const styleTag = match[1].trim();
                currentStyle = styleMap[styleTag] ?? styleTag.toLowerCase();
                lastIndex = regex.lastIndex;
            }
            const remainingText = text.substring(lastIndex).trim();
            if (remainingText) {
                segments.push({ style: currentStyle, text: remainingText });
            }
            
            if (segments.length === 0 && text.trim()) {
                segments.push({ style: 'natural', text: text.trim() });
            }
            return segments;
        }

        els.generateBtn.onclick = async () => {
            const text = els.textInput.value.trim();
            if (!text) return showToast("הכנס טקסט לקריינות");
            
            toggleLoader('btn', true);
            try {
                const segments = parseMultiStyleText(text);
                
                // Concurrent performance optimizations for parallel model audio synthesis streams
                // שליחת הבקשות בצורה סדרתית כדי למנוע שגיאת 429
const results = [];
for (const seg of segments) {
const result = await apiCall(modelAudio, {
    text: text,
    voiceConfig: {
        prebuiltVoiceConfig: {
            voiceName: els.voiceSelect.value
        }
    },
    // הוספת הסגנון כהנחיה מובנית למודל השמע
    speakingStyle: els.styleSelect.value.toUpperCase() 
});
    results.push(res);
    // אופציונלי: השהייה קלה של 200 מילישניות בין בקשה לבקשה לביטחון מקסימלי
    await new Promise(r => setTimeout(r, 200));
}
                
                let totalLength = 0;
                const byteSegments = results.map(res => {
                    const base64Data = res.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
                    if (!base64Data) return new Uint8Array(0);
                    const binary = atob(base64Data);
                    const bytes = new Uint8Array(binary.length);
                    for (let idx = 0; idx < binary.length; idx++) {
                        bytes[idx] = binary.charCodeAt(idx);
                    }
                    totalLength += bytes.length;
                    return bytes;
                });

                if (totalLength === 0) throw new Error("לא התקבלו נתוני שמע מהשרת");

                const combinedPCM = new Uint8Array(totalLength);
                let currentOffset = 0;
                for (const segmentArray of byteSegments) {
                    combinedPCM.set(segmentArray, currentOffset);
                    currentOffset += segmentArray.length;
                }

                let sampleRate = 24000;
                for (const res of results) {
                    const mimeType = res.candidates?.[0]?.content?.parts?.[0]?.inlineData?.mimeType || "";
                    if (mimeType.includes('rate=')) {
                        sampleRate = parseInt(mimeType.split('rate=')[1]) || 24000;
                        break;
                    }
                }

                const wavBlob = pcmToWav(combinedPCM, sampleRate);
                const base64Audio = await blobToBase64(wavBlob);
                
                const track = {
                    id: 'track_' + Date.now(),
                    createdAt: Date.now(),
                    title: text.substring(0, 35),
                    voice: els.voiceSelect.value,
                    style: segments.map(s => s.style).join(', '),
                    audioData: base64Audio
                };

                await saveTrack(track);
                await renderStoredTracks();
                showToast("קריינות משולבת הופקה ויושרה בהצלחה!", "success");
                
            } catch (e) { 
                if(e.message !== "Missing API Key") showToast(e.message); 
            }
            toggleLoader('btn', false);
        };

        // --- Low-level Storage & Conversion Utilities ---

        function pcmToWav(uint8Array, rate) {
            const header = new ArrayBuffer(44);
            const v = new DataView(header);
            const s = (off, str) => { for (let i = 0; i < str.length; i++) v.setUint8(off + i, str.charCodeAt(i)); };
            s(0, 'RIFF'); v.setUint32(4, 36 + uint8Array.length, true); s(8, 'WAVE'); s(12, 'fmt '); v.setUint32(16, 16, true);
            v.setUint16(20, 1, true); v.setUint16(22, 1, true); v.setUint32(24, rate, true); v.setUint32(28, rate * 2, true);
            v.setUint16(32, 2, true); v.setUint16(34, 16, true); s(36, 'data'); v.setUint32(40, uint8Array.length, true);
            return new Blob([header, uint8Array], { type: 'audio/wav' });
        }

        function blobToBase64(blob) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(blob);
            });
        }

        function base64ToBlob(dataURL) {
            const parts = dataURL.split(';base64,');
            const contentType = parts[0].split(':')[1];
            const raw = atob(parts[1]);
            const uInt8Array = new Uint8Array(raw.length);
            for (let i = 0; i < raw.length; ++i) {
                uInt8Array[i] = raw.charCodeAt(i);
            }
            return new Blob([uInt8Array], { type: contentType });
        }

        // --- IndexedDB Persistence Controllers ---

        async function saveTrack(track) {
            await removeOldTracks();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, 'readwrite');
                const store = tx.objectStore(STORE_NAME);
                store.put(track);
                tx.oncomplete = () => resolve();
                tx.onerror = () => reject(tx.error);
            });
        }

        function getAllTracks() {
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, 'readonly');
                const store = tx.objectStore(STORE_NAME);
                const request = store.getAll();
                request.onsuccess = () => {
                    const tracks = request.result.sort((a, b) => b.createdAt - a.createdAt);
                    resolve(tracks);
                };
                request.onerror = () => reject(request.error);
            });
        }

        async function removeOldTracks() {
            const tracks = await getAllTracks();
            if (tracks.length >= MAX_STORED_TRACKS) {
                const totalToDelete = tracks.length - MAX_STORED_TRACKS + 1;
                const tx = db.transaction(STORE_NAME, 'readwrite');
                const store = tx.objectStore(STORE_NAME);
                for (let i = 0; i < totalToDelete; i++) {
                    const oldest = tracks[tracks.length - 1 - i];
                    if (oldest) store.delete(oldest.id);
                }
                return new Promise((resolve) => tx.oncomplete = () => resolve());
            }
        }

        window.deleteSingleTrack = async function(id) {
            const tx = db.transaction(STORE_NAME, 'readwrite');
            tx.objectStore(STORE_NAME).delete(id);
            tx.oncomplete = () => {
                renderStoredTracks();
                showToast("הקלטה נמחקה בהצלחה", "success");
            };
        };

        async function renderStoredTracks() {
            const tracks = await getAllTracks();
            els.tracksContainer.innerHTML = '';
            
            if (tracks.length === 0) {
                els.noTracks.classList.remove('hidden');
                els.tracksContainer.appendChild(els.noTracks);
                return;
            }
            
            els.noTracks.classList.add('hidden');
            const fragment = document.createDocumentFragment();
            
            tracks.forEach(track => {
                const div = document.createElement('div');
                div.className = "card p-4 rounded-2xl flex items-center gap-4 shadow-sm border-slate-100 transition-all duration-300";
                
                const blob = base64ToBlob(track.audioData);
                const url = URL.createObjectURL(blob);
                
                div.innerHTML = `
                    <div class="flex-grow min-w-0">
                        <div class="font-bold text-sm truncate">${escapeHtml(track.title)}...</div>
                        <div class="text-[10px] text-slate-400">${escapeHtml(track.voice)} | ${escapeHtml(track.style)}</div>
                    </div>
                    <audio src="${url}" controls class="h-8 w-40"></audio>
                    <div class="flex gap-1">
                        <a href="${url}" download="voice_${track.id}.wav" class="p-2 hover:bg-indigo-50 rounded-lg text-indigo-600 transition-colors">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                        </a>
                        <button onclick="deleteSingleTrack('${track.id}')" class="p-2 hover:bg-red-50 rounded-lg text-red-500 transition-colors">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                        </button>
                    </div>
                `;
                fragment.appendChild(div);
            });
            els.tracksContainer.appendChild(fragment);
        }

        document.getElementById('clearTracks').onclick = async () => {
            const tx = db.transaction(STORE_NAME, 'readwrite');
            tx.objectStore(STORE_NAME).clear();
            tx.oncomplete = () => {
                renderStoredTracks();
                showToast("ההיסטוריה נמחקה לחלוטין", "success");
            };
        };

        // --- Interface Micro-Helpers ---

        function toggleLoader(key, show) {
            const loader = document.getElementById(key + 'Loader');
            const icon = document.getElementById(key + 'Icon');
            const text = document.getElementById(key + 'Text');
            if (loader) loader.classList.toggle('hidden', !show);
            if (icon) icon.classList.toggle('hidden', show);
            if (text) text.innerText = show ? "מעבד..." : "הפק קריינות עכשיו";
            if (key === 'btn') els.generateBtn.disabled = show;
        }

        function escapeHtml(str) {
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }
